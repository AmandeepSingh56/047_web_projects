<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1> Interactive Quiz</h1>
    <p>Check your basic web development knowledge</p>
</header>

<main>
    <div class="quiz-box" id="quizBox">
        <p class="progress" id="progress">Question 1 of 3</p>

        <h2 id="question">Question will appear here</h2>

        <div id="options" style="background-color: aqua;"></div>

        <button id="nextBtn">Next</button>
    </div>

    <div class="quiz-box hidden" id="resultBox">
        <h2 id="score" style="color: magenta;"> </h2>
        <p id="feedback"></p>
        <button id="restartBtn">Restart Quiz</button>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
